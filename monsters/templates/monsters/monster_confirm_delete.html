{% extends 'base.html' %}

{% block title %}Удаление монстра{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>🗑️ Подтверждение удаления</h3>
            </div>
            <div class="card-body">
                <p class="fs-5">Вы уверены, что хотите удалить монстра <strong>"{{ object.name }}"</strong>?</p>
                <p class="text-danger">Это действие нельзя отменить!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'monster_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
